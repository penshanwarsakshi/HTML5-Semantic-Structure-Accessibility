<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sakshi Portfolio</title>

    <meta name="description" content="Get in touch with Sakshi through the accessible contact form.">
</head>

<body>

    <header>
        <h1>Contact Me</h1>

        <nav aria-label="Primary Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section aria-labelledby="contact-heading">
            <h2 id="contact-heading">Send a Message</h2>

            <form action="#" method="post" aria-label="Contact Form">

                <div>
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        autocomplete="name"
                        aria-required="true">
                </div>

                <div>
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="email"
                        aria-required="true">
                </div>

                <div>
                    <label for="subject">Subject</label>
                    <input
                        type="text"
                        id="subject"
                        name="subject">
                </div>

                <div>
                    <label for="message">Message</label>
                    <textarea
                        id="message"
                        name="message"
                        rows="5"
                        required
                        aria-required="true"></textarea>
                </div>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Sakshi.</p>
    </footer>

</body>
</html>
